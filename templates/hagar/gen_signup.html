<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire à {{ project.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 3rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #e2e8f0; animation: slideIn 0.5s ease-out; }
        h2 { margin: 0 0 0.5rem 0; font-size: 1.75rem; font-weight: 800; text-align: center; color: #111827; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 2.5rem; font-size: 0.95rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-weight: 700; font-size: 0.85rem; color: #374151; }
        input, select { width: 100%; padding: 0.8rem 1rem; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; box-sizing: border-box; transition: all 0.2s; background: #f8fafc; color: var(--text); font-family: inherit; }
        input:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        input[type="checkbox"], input[type="radio"] { width: auto; margin-right: 10px; transform: scale(1.2); cursor: pointer; }
        input[type="color"] { height: 50px; padding: 5px; cursor: pointer; }
        input[type="range"] { padding: 0; height: 8px; background: #e2e8f0; border: none; }
        button { width: 100%; padding: 1.1rem; background: var(--primary); color: white; border: none; border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: 700; margin-top: 1rem; transition: transform 0.2s, background 0.2s; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        button:hover { background: #4338ca; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .msg { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; padding: 1rem; border-radius: 12px; display: none; font-weight: 600; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>{{ project.name }}</h2>
        <p class="subtitle">Créez votre compte en quelques secondes</p>
        <form id="signupForm">
            {% for field in project.fields %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {% if field.field_type == 'checkbox' %}
                        <div style="display: flex; align-items: center; background: #f8fafc; padding: 0.8rem; border-radius: 12px; border: 2px solid #f1f5f9;">
                            <input type="checkbox" name="{{ field.label }}" value="Oui" id="chk-{{ loop.index }}">
                            <label for="chk-{{ loop.index }}" style="margin: 0; font-weight: 500;">Accepter {{ field.label }}</label>
                        </div>
                    {% elif field.field_type == 'radio' %}
                        <div style="display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 0.8rem; border-radius: 12px; border: 2px solid #f1f5f9;">
                            <label style="display: flex; align-items: center; margin: 0; font-weight: 500;"><input type="radio" name="{{ field.label }}" value="Option 1" checked> Oui</label>
                            <label style="display: flex; align-items: center; margin: 0; font-weight: 500;"><input type="radio" name="{{ field.label }}" value="Option 2"> Non</label>
                        </div>
                    {% else %}
                        <input type="{{ field.field_type }}" name="{{ field.label }}" required placeholder="{{ field.label }}">
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">S'inscrire maintenant</button>
        </form>
        <div id="message" class="msg"></div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block';
            msgDiv.style.background = '#f8fafc';
            msgDiv.style.color = '#64748b';
            msgDiv.innerText = 'Envoi en cours...';
            
            try {
                const response = await fetch('{{ request.host_url.rstrip("/") }}/api/hagar/{{ project.api_token }}/register', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    msgDiv.style.background = '#ecfdf5';
                    msgDiv.style.color = '#059669';
                    msgDiv.innerText = '✨ Félicitations ! Inscription réussie.';
                    e.target.reset();
                } else {
                    msgDiv.style.background = '#fef2f2';
                    msgDiv.style.color = '#dc2626';
                    msgDiv.innerText = result.error || 'Erreur : veuillez vérifier vos informations.';
                }
            } catch (err) {
                msgDiv.style.background = '#fef2f2';
                msgDiv.style.color = '#dc2626';
                msgDiv.innerText = 'Connexion impossible au serveur Hagar.';
            }
        });
    </script>
</body>
</html>
