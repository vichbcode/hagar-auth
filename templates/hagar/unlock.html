{% extends 'layout.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 1.5rem;">
    <div style="background: white; width: 100%; max-width: 450px; border-radius: 24px; padding: 3rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); border: 1px solid #e5e7eb; animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);">
        
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="background: #fef2f2; width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; transform: rotate(-5deg);">
                <span style="font-size: 2.5rem;"></span>
            </div>
            <h2 style="font-size: 1.8rem; color: #111827; margin: 0 0 0.5rem 0;">Accès Protégé</h2>
            <p style="color: #6b7280; font-size: 1rem; line-height: 1.5;">
                Le Hagar <strong>"{{ project.name }}"</strong> est sécurisé.<br>Entrez le mot de passe pour continuer.
            </p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group" style="margin-bottom: 2rem;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #374151; margin-bottom: 0.8rem;">Mot de passe du projet</label>
                <input type="password" name="project_password" required autofocus placeholder="••••••••" 
                       style="width: 100%; padding: 1rem 1.2rem; border: 2px solid #f3f4f6; border-radius: 14px; font-size: 1.2rem; outline: none; transition: all 0.3s; background: #f9fafb; letter-spacing: 2px;">
            </div>
            
            <button type="submit" class="btn-primary" 
                    style="width: 100%; padding: 1.1rem; border-radius: 14px; font-weight: 700; font-size: 1.05rem; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);">
                Déverrouiller le Hagar
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid #f3f4f6; padding-top: 1.5rem;">
            <a href="{{ url_for('dashboard') }}" 
               style="text-decoration: none; color: #9ca3af; font-size: 0.9rem; font-weight: 600; transition: color 0.2s;">
                ← Retour au Dashboard
            </a>
        </div>
    </div>
</div>

<style>
@keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
input:focus {
    border-color: var(--primary) !important;
    background: white !important;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
}
</style>
{% endblock %}
